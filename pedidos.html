<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finalizar Pedido</title>

<style>
:root {
  --marrom: #4a2a1a;
  --vermelho: #b22222;
  --dourado: #f5c16c;
}

* {
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  margin: 0;
  background: url("img/fundo.jpg") center/cover fixed no-repeat;
  min-height: 100vh;
}

.overlay {
  background: rgba(0,0,0,.6);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 15px;
}

.container {
  background: rgba(255,255,255,.95);
  width: 100%;
  max-width: 420px;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,.4);
}

h2 {
  text-align: center;
  margin: 0 0 15px;
  color: var(--vermelho);
}

label {
  font-weight: bold;
  display: block;
  margin-top: 12px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-top: 5px;
  font-size: 1rem;
}

textarea {
  resize: none;
}

button {
  margin-top: 15px;
  background: linear-gradient(135deg, #25d366, #1eb856);
  border: none;
  color: #fff;
  font-size: 1.1rem;
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  filter: brightness(1.1);
}

.voltar {
  text-align: center;
  margin-top: 12px;
}

.voltar a {
  color: #555;
  text-decoration: none;
  font-size: .95rem;
  
}

.topo {
  text-align: center;
  margin-bottom: 10px;
}

.topo img {
  width: 80px;
  margin-bottom: 5px;
}

.produto-box {
  background: #f7f2ed;
  border-left: 5px solid var(--vermelho);
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  font-weight: bold;
  color: var(--marrom);
}
.voltar img{ width: 40px;
    
}
</style>
</head>

<body>

<div class="overlay">

<div class="container">

  <div class="topo">
    <!-- Se quiser pode colocar uma logo aqui -->
    <!-- <img src="img/logo.png"> -->
    <h2>Finalizar Pedido</h2>
  </div>

  <div class="produto-box" id="produtoBox"></div>

  <form onsubmit="enviarPedido(); return false;">

    <label>Nome</label>
    <input type="text" id="nome" placeholder="Seu nome" required>

    <label>Endereço</label>
    <input type="text" id="endereco" placeholder="Rua, número, complemento" required>

    <label>Bairro</label>
    <input type="text" id="bairro" placeholder="Seu bairro" required>

    <label>Forma de pagamento</label>
    <select id="pagamento" required>
      <option value="">Selecione</option>
      <option>Pix</option>
      <option>Dinheiro</option>
      <option>Cartão</option>
    </select>

    <label>Observações</label>
    <textarea id="obs" rows="3" placeholder="Ex: sem cebola, sem sal, ponto da carne..."></textarea>

    <button type="submit">Enviar Pedido no WhatsApp</button>

  </form>

  <div class="voltar">
    <a href="index.html">VOLTAR</a>
  </div>

</div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const produto = urlParams.get("produto") || "Produto não informado";

document.getElementById("produtoBox").innerHTML = "🍽 " + produto;

function enviarPedido() {

  if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(function (pos) {

      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const mapa = `https://maps.google.com/?q=${lat},${lon}`;

      montarMensagem(mapa);

    }, function () {

      montarMensagem('Localização não autorizada');

    });

  } else {

    montarMensagem('Localização não suportada');

  }
}

function montarMensagem(mapa) {

  const produto = document.getElementById("produtoBox").innerText.replace('🍽 ', '');
  const nome = document.getElementById("nome").value;
  const endereco = document.getElementById("endereco").value;
  const bairro = document.getElementById("bairro").value;
  const pagamento = document.getElementById("pagamento").value;
  const obs = document.getElementById("obs").value;

  let msg =
    `Olá! Gostaria de fazer um pedido:%0A%0A` +
    `🍽 Produto: ${produto}%0A` +
    `👤 Nome: ${nome}%0A` +
    `🏠 Endereço: ${endereco}%0A` +
    `📍 Bairro: ${bairro}%0A` +
    `📌 Localização: ${mapa}%0A` +
    `💳 Pagamento: ${pagamento}%0A` +
    `📝 Observações: ${obs || "Nenhuma"}`;

  window.open(`https://wa.me/5538984180596?text=${msg}`, "_blank");
}
</script>

</body>
</html>
