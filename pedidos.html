<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finalizar Pedido</title>

<style>
:root {
  --marrom: #4a2a1a;
  --vermelho: #b22222;
  --dourado: #f5c16c;
}

* {
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  margin: 0;
  background: url("img/fundo.jpg") center/cover fixed no-repeat;
  min-height: 100vh;
}

.overlay {
  background: rgba(0,0,0,.6);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 15px;
}

.container {
  background: rgba(255,255,255,.95);
  width: 100%;
  max-width: 420px;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,.4);
}

h2 {
  text-align: center;
  margin: 0 0 15px;
  color: var(--vermelho);
}

label {
  font-weight: bold;
  display: block;
  margin-top: 12px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-top: 5px;
  font-size: 1rem;
}

textarea {
  resize: none;
}

button {
  margin-top: 15px;
  background: linear-gradient(135deg, #25d366, #1eb856);
  border: none;
  color: #fff;
  font-size: 1.1rem;
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  filter: brightness(1.1);
}

.voltar {
  text-align: center;
  margin-top: 12px;
}

.voltar a {
  color: #555;
  text-decoration: none;
  font-size: .95rem;
  
}

.topo {
  text-align: center;
  margin-bottom: 10px;
}

.topo img {
  width: 80px;
  margin-bottom: 5px;
}

.produto-box {
  background: #f7f2ed;
  border-left: 5px solid var(--vermelho);
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  font-weight: bold;
  color: var(--marrom);
}
.voltar img{ width: 40px;
    
}
</style>
</head>

<body>

<div class="overlay">

<div class="container">

  <div class="topo">
    
    <h2>Finalizar Pedido</h2>
  </div>

  <div class="produto-box" id="produtoBox"></div>

  <form onsubmit="enviarPedido(); return false;">

    <label>Nome</label>
    <input type="text" id="nome" placeholder="Seu nome" required>

    <label>Endereço</label>
    <input type="text" id="endereco" placeholder="Rua, número, complemento" required>

    <label>Bairro</label>
    <input type="text" id="bairro" placeholder="Seu bairro" required>

    <label>Forma de pagamento</label>
    <select id="pagamento" required>
      <option value="">Selecione</option>
      <option>Pix</option>
      <option>Dinheiro</option>
      <option>Cartão</option>
    </select>
    <label>Troco</label>
    <input type="text" id="endereco" placeholder="Digite seu troco em caso de dinheiro" required>

    
    <label>Observações</label>
    <textarea id="obs" rows="3" placeholder="Ex: sem cebola, sem tomate, ponto da carne..."></textarea>

    <button type="submit">Enviar Pedido no WhatsApp</button>

  </form>

  <div class="voltar">
    <a href="index.html">VOLTAR</a>
  </div>

</div>
</div>

<script>

const dados = JSON.parse(localStorage.getItem("pedido")) || [];

let resumoHTML = "";
let mensagemProdutos = "";
let total = 0;

dados.forEach(item => {
  let subtotal = item.preco * item.qtd;
  total += subtotal;

  resumoHTML += `
    <div class="produto-box">
      ${item.nome} - ${item.qtd}x - R$ ${subtotal.toFixed(2)}
    </div>
  `;

  mensagemProdutos +=
    `🍽 ${item.nome} - ${item.qtd}x - R$ ${subtotal.toFixed(2)}\n`;
});

resumoHTML += `
  <div class="produto-box" style="background:#ffeaa7;">
    Total: R$ ${total.toFixed(2)}
  </div>
`;

document.getElementById("produtoBox").innerHTML = resumoHTML;


function enviarPedido() {

  const nome = document.getElementById("nome").value;
  const endereco = document.getElementById("endereco").value;
  const bairro = document.getElementById("bairro").value;
  const pagamento = document.getElementById("pagamento").value;
  const obs = document.getElementById("obs").value;

  if(!nome || !endereco || !bairro || !pagamento){
    alert("Preencha todos os campos obrigatórios!");
    return;
  }

  let mensagem =
`Olá! Gostaria de fazer um pedido:

${mensagemProdutos}

Total: R$ ${total.toFixed(2)}

👤 Nome: ${nome}
🏠 Endereço: ${endereco}
📍 Bairro: ${bairro}
💳 Pagamento: ${pagamento}
📝 Observações: ${obs || "Nenhuma"}
`;

  let numero = "5538984180596";

  let url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;

  window.location.href = url;

  localStorage.removeItem("pedido");
}

</script>

</body>
</html>
